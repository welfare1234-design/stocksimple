<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 48" fill="none">
  <!-- Icon: 2x2 grid with rotated squares -->
  <g transform="translate(4, 4)">
    <!-- Top-left: pink/magenta -->
    <rect x="0" y="0" width="18" height="18" rx="3" fill="#E040FB"/>
    <!-- Top-right: magenta to pink gradient -->
    <rect x="20" y="0" width="18" height="18" rx="3" fill="url(#g1)" transform="rotate(10, 29, 9)"/>
    <!-- Bottom-left: purple -->
    <rect x="0" y="20" width="18" height="18" rx="3" fill="#7C4DFF"/>
    <!-- Bottom-right: cyan -->
    <rect x="20" y="20" width="18" height="18" rx="3" fill="#00E5FF" transform="rotate(-10, 29, 29)"/>
  </g>
  <!-- Text -->
  <text x="56" y="34" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="26" font-weight="600" fill="#FFFFFF" letter-spacing="-0.5">Stocksimple</text>
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E040FB"/>
      <stop offset="100%" stop-color="#FF80AB"/>
    </linearGradient>
  </defs>
</svg>
